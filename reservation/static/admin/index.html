<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#f8f9fc;color:#0c1a35}
/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border:1px solid #e2e8f0;padding:2.5rem 2rem;width:340px}
.login-box h1{font-size:1.3rem;margin-bottom:1.75rem}
/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#0c1a35;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:1.5rem 1.25rem;font-size:1.1rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.08)}
.nav-item{padding:0.875rem 1.25rem;cursor:pointer;font-size:0.85rem;color:rgba(255,255,255,0.7);transition:all 0.15s;display:flex;align-items:center;gap:0.75rem}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.08);color:#fff}
.sidebar-bottom{margin-top:auto;padding:1rem 1.25rem}
.content{flex:1;overflow:auto}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:1rem;font-weight:600}
.main{padding:2rem}
/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:#fff;border:1px solid #e2e8f0;padding:1.25rem 1.5rem}
.stat-val{font-size:2rem;font-weight:700;color:#0c1a35;line-height:1}
.stat-lbl{font-size:0.72rem;color:#64748b;margin-top:0.4rem;letter-spacing:0.04em}
/* Table */
.tbl-wrap{background:#fff;border:1px solid #e2e8f0;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{background:#f8f9fc;padding:0.75rem 1rem;text-align:left;font-size:0.72rem;font-weight:500;color:#64748b;letter-spacing:0.04em;border-bottom:1px solid #e2e8f0}
td{padding:0.75rem 1rem;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
/* Badges */
.badge{display:inline-block;font-size:0.68rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:2px;letter-spacing:0.04em}
.badge-confirmed{background:#dcfce7;color:#16a34a}
.badge-cancelled{background:#fee2e2;color:#dc2626}
.badge-done{background:#e0e7ff;color:#4338ca}
.badge-no_show{background:#fef3c7;color:#d97706}
/* Forms */
label{display:block;font-size:0.72rem;font-weight:500;color:#64748b;letter-spacing:0.04em;margin-bottom:0.35rem}
input,select,textarea{width:100%;border:1px solid #e2e8f0;padding:0.7rem 0.875rem;font-size:0.875rem;color:#0c1a35;outline:none;font-family:inherit;border-radius:2px}
input:focus,select:focus,textarea:focus{border-color:#0c1a35}
.field{margin-bottom:1rem}
.btn{display:inline-block;padding:0.65rem 1.5rem;background:#0c1a35;color:#fff;border:none;font-size:0.82rem;font-weight:500;cursor:pointer;border-radius:2px;transition:opacity 0.15s;font-family:inherit}
.btn:hover{opacity:0.85}
.btn-sm{padding:0.4rem 0.875rem;font-size:0.75rem}
.btn-gold{background:#c9a84c;color:#0c1a35}
.btn-red{background:#dc2626}
.btn-outline{background:#fff;color:#0c1a35;border:1px solid #0c1a35}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #e2e8f0}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:2rem}
.modal h3{font-size:1rem;margin-bottom:1.5rem;font-weight:600}
/* Misc */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-header h3{font-size:0.95rem;font-weight:600}
.msg{font-size:0.82rem;padding:0.75rem 1rem;border-radius:2px;margin-bottom:1rem}
.msg-ok{background:#dcfce7;color:#16a34a}
.msg-err{background:#fee2e2;color:#dc2626}
.search-bar{display:flex;gap:0.75rem;margin-bottom:1.25rem}
.search-bar input{flex:1}
.page-nav{display:flex;gap:0.5rem;align-items:center;margin-top:1rem;font-size:0.82rem}
.date-nav{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem}
.date-nav input[type=date]{width:auto}
.hidden{display:none}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h1>管理画面ログイン</h1>
    <div class="field"><label>パスワード</label><input id="pw-input" type="password" placeholder="パスワードを入力"></div>
    <div id="login-err" class="msg msg-err hidden">パスワードが正しくありません</div>
    <button class="btn" style="width:100%" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" class="layout hidden">
  <div class="sidebar">
    <div class="sidebar-logo">管理画面</div>
    <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      ダッシュボード
    </div>
    <div class="nav-item" data-tab="reservations" onclick="switchTab('reservations')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      予約管理
    </div>
    <div class="nav-item" data-tab="customers" onclick="switchTab('customers')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      顧客管理
    </div>
    <div class="nav-item" data-tab="reminder" onclick="switchTab('reminder')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      リマインド
    </div>
    <div class="sidebar-bottom">
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <div class="topbar">
      <h2 id="tab-title">ダッシュボード</h2>
      <span id="topbar-date" style="font-size:0.8rem;color:#64748b"></span>
    </div>
    <div class="main">

      <!-- ダッシュボード -->
      <div id="tab-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-val" id="s-today">-</div><div class="stat-lbl">今日の予約</div></div>
          <div class="stat-card"><div class="stat-val" id="s-month">-</div><div class="stat-lbl">今月の予約</div></div>
          <div class="stat-card"><div class="stat-val" id="s-cancel">-%</div><div class="stat-lbl">キャンセル率</div></div>
          <div class="stat-card"><div class="stat-val" id="s-customers">-</div><div class="stat-lbl">総顧客数</div></div>
        </div>
        <div class="section-header"><h3>今日の予約</h3></div>
        <div class="tbl-wrap" id="today-reservations-wrap">
          <div style="padding:2rem;text-align:center;color:#64748b;font-size:0.85rem">読み込み中...</div>
        </div>
      </div>

      <!-- 予約管理 -->
      <div id="tab-reservations" class="hidden">
        <div class="date-nav">
          <button class="btn btn-ghost btn-sm" onclick="changeDate(-1)">←</button>
          <input type="date" id="res-date" onchange="loadReservations()">
          <button class="btn btn-ghost btn-sm" onclick="changeDate(1)">→</button>
          <button class="btn btn-sm" onclick="openNewResModal()">＋ 手動追加</button>
        </div>
        <div class="tbl-wrap" id="reservations-wrap">
          <div style="padding:2rem;text-align:center;color:#64748b;font-size:0.85rem">日付を選択してください</div>
        </div>
      </div>

      <!-- 顧客管理 -->
      <div id="tab-customers" class="hidden">
        <div class="search-bar">
          <input id="cust-keyword" type="text" placeholder="名前・電話・メールで検索" onkeydown="if(event.key==='Enter')searchCustomers()">
          <button class="btn btn-sm" onclick="searchCustomers()">検索</button>
          <button class="btn btn-gold btn-sm" onclick="openNewCustModal()">＋ 追加</button>
        </div>
        <div style="display:flex;gap:0.75rem;margin-bottom:1.25rem">
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">
            CSVインポート
            <input type="file" accept=".csv,.xlsx,.xls" style="display:none" onchange="importCSV(this)">
          </label>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()">CSVエクスポート</button>
        </div>
        <div id="import-msg"></div>
        <div class="tbl-wrap" id="customers-wrap">
          <div style="padding:2rem;text-align:center;color:#64748b;font-size:0.85rem">読み込み中...</div>
        </div>
        <div class="page-nav" id="cust-page-nav"></div>
      </div>

      <!-- リマインド -->
      <div id="tab-reminder" class="hidden">
        <div class="section-header">
          <h3>前日リマインド送信</h3>
          <button class="btn btn-sm" onclick="runReminder()">手動実行</button>
        </div>
        <p style="font-size:0.85rem;color:#64748b;margin-bottom:1.5rem">明日の予約でメールアドレスが登録されている顧客にリマインドメールを送信します。</p>
        <div id="reminder-msg"></div>
      </div>

    </div>
  </div>
</div>

<!-- 予約詳細モーダル -->
<div class="overlay" id="res-modal">
  <div class="modal">
    <h3>予約詳細</h3>
    <div id="res-modal-body"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap">
      <button class="btn btn-red btn-sm" onclick="changeStatus(currentResId,'cancelled')">キャンセル</button>
      <button class="btn btn-sm" onclick="changeStatus(currentResId,'done')" style="background:#4338ca">完了</button>
      <button class="btn btn-sm" onclick="changeStatus(currentResId,'no_show')" style="background:#d97706">無断キャンセル</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('res-modal')" style="margin-left:auto">閉じる</button>
    </div>
  </div>
</div>

<!-- 顧客詳細モーダル -->
<div class="overlay" id="cust-modal">
  <div class="modal">
    <h3 id="cust-modal-title">顧客詳細</h3>
    <div id="cust-modal-body"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
      <button class="btn btn-sm" onclick="saveCust()">保存</button>
      <button class="btn btn-red btn-sm" id="cust-del-btn" onclick="deleteCust()">削除</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('cust-modal')" style="margin-left:auto">閉じる</button>
    </div>
  </div>
</div>

<!-- 手動予約モーダル -->
<div class="overlay" id="new-res-modal">
  <div class="modal">
    <h3>手動予約追加</h3>
    <div class="field"><label>お名前</label><input id="nr-name" type="text"></div>
    <div class="field"><label>電話番号</label><input id="nr-phone" type="tel"></div>
    <div class="field"><label>メール</label><input id="nr-email" type="email"></div>
    <div class="field"><label>日付</label><input id="nr-date" type="date"></div>
    <div class="field"><label>時間</label><input id="nr-time" type="time" step="1800"></div>
    <div class="field"><label>メニュー</label><select id="nr-menu"><option value="">選択してください</option></select></div>
    <div class="field"><label>備考</label><textarea id="nr-notes" rows="2"></textarea></div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button class="btn btn-sm" onclick="submitNewRes()">追加</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('new-res-modal')">閉じる</button>
    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('admin_token') || '';
let currentResId = null, currentCustId = null;
let custPage = 1, custKeyword = '';

async function api(method, path, body) {
  const opts = { method, headers: {'X-Token': token, 'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) { doLogout(); return null; }
  return res;
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const res = await fetch(API + '/admin/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({password: pw})
  });
  if (res.ok) {
    const data = await res.json();
    token = data.token;
    localStorage.setItem('admin_token', token);
    showMain();
  } else {
    document.getElementById('login-err').classList.remove('hidden');
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function checkAuth() {
  if (!token) return;
  const res = await api('GET', '/admin/me');
  if (res && res.ok) showMain();
}

function showMain() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  loadDashboard();
}

function doLogout() {
  api('POST', '/admin/logout');
  token = ''; localStorage.removeItem('admin_token');
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

const tabTitles = { dashboard:'ダッシュボード', reservations:'予約管理', customers:'顧客管理', reminder:'リマインド' };
function switchTab(tab) {
  document.querySelectorAll('[data-tab]').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.getElementById('tab-title').textContent = tabTitles[tab];
  if (tab === 'reservations') { document.getElementById('res-date').value = today(); loadReservations(); }
  if (tab === 'customers') loadCustomers();
}

function today() { return new Date().toISOString().slice(0,10); }

async function loadDashboard() {
  const res = await api('GET', '/admin/stats');
  if (!res || !res.ok) return;
  const d = await res.json();
  document.getElementById('s-today').textContent = d.today;
  document.getElementById('s-month').textContent = d.month;
  document.getElementById('s-cancel').textContent = d.cancel_rate + '%';
  document.getElementById('s-customers').textContent = d.total_customers;

  const r2 = await api('GET', '/admin/reservations?date=' + today());
  const d2 = r2 && r2.ok ? await r2.json() : {reservations:[]};
  renderReservationTable(d2.reservations, 'today-reservations-wrap');
}

async function loadReservations() {
  const date = document.getElementById('res-date').value;
  if (!date) return;
  const res = await api('GET', '/admin/reservations?date=' + date);
  if (!res || !res.ok) return;
  const d = await res.json();
  renderReservationTable(d.reservations, 'reservations-wrap');
}

function changeDate(delta) {
  const inp = document.getElementById('res-date');
  const d = new Date(inp.value || today());
  d.setDate(d.getDate() + delta);
  inp.value = d.toISOString().slice(0,10);
  loadReservations();
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function statusBadge(s) {
  const map = {confirmed:'確認済み',cancelled:'キャンセル',done:'完了',no_show:'無断キャンセル'};
  const label = map[s] || esc(s);
  return `<span class="badge badge-${esc(s)}">${label}</span>`;
}

function renderReservationTable(rows, containerId) {
  const el = document.getElementById(containerId);
  if (!rows.length) { el.innerHTML = '<div style="padding:2rem;text-align:center;color:#64748b;font-size:0.85rem">予約はありません</div>'; return; }
  el.innerHTML = `<table><thead><tr>
    <th>時間</th><th>お名前</th><th>電話番号</th><th>メニュー</th><th>ステータス</th><th></th>
  </tr></thead><tbody>${rows.map(r => `<tr>
    <td>${esc(r.time)}</td>
    <td>${esc(r.name)}</td>
    <td>${esc(r.phone)||'—'}</td>
    <td>${esc(r.menu_name)||'—'}</td>
    <td>${statusBadge(r.status)}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="openResModal(${Number(r.id)})">詳細</button></td>
  </tr>`).join('')}</tbody></table>`;
}

async function openResModal(id) {
  currentResId = id;
  const res = await api('GET', '/admin/reservations/' + id);
  if (!res || !res.ok) return;
  const r = await res.json();
  document.getElementById('res-modal-body').innerHTML = `
    <table style="width:100%;font-size:0.875rem"><tbody>
      <tr><td style="color:#64748b;width:120px;padding:0.5rem 0">予約ID</td><td>#${Number(r.id)}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">日時</td><td>${esc(r.date)} ${esc(r.time)}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">メニュー</td><td>${esc(r.menu_name)||'—'}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">お名前</td><td>${esc(r.name)}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">電話番号</td><td>${esc(r.phone)||'—'}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">メール</td><td>${esc(r.email)||'—'}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">備考</td><td>${esc(r.notes)||'—'}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">経路</td><td>${esc(r.channel)}</td></tr>
      <tr><td style="color:#64748b;padding:0.5rem 0">ステータス</td><td>${statusBadge(r.status)}</td></tr>
    </tbody></table>`;
  openModal('res-modal');
}

async function changeStatus(id, status) {
  const res = await api('PATCH', '/admin/reservations/' + id + '/status', {status});
  if (res && res.ok) { closeModal('res-modal'); loadReservations(); loadDashboard(); }
}

// 顧客管理
let custTotalPages = 1;
async function loadCustomers(page) {
  custPage = page || 1;
  const kw = document.getElementById('cust-keyword').value.trim();
  custKeyword = kw;
  const res = await api('GET', `/admin/customers?keyword=${encodeURIComponent(kw)}&page=${custPage}&per_page=20`);
  if (!res || !res.ok) return;
  const d = await res.json();
  custTotalPages = Math.ceil(d.total / 20);
  const el = document.getElementById('customers-wrap');
  if (!d.items.length) { el.innerHTML = '<div style="padding:2rem;text-align:center;color:#64748b;font-size:0.85rem">顧客が見つかりません</div>'; return; }
  el.innerHTML = `<table><thead><tr>
    <th>ID</th><th>氏名</th><th>電話番号</th><th>メール</th><th>登録元</th><th>登録日</th><th></th>
  </tr></thead><tbody>${d.items.map(c => `<tr>
    <td>${Number(c.id)}</td>
    <td><a href="#" onclick="openCustModal(${Number(c.id)});return false" style="color:#0c1a35;font-weight:500">${esc(c.name)}</a></td>
    <td>${esc(c.phone)||'—'}</td>
    <td>${esc(c.email)||'—'}</td>
    <td>${esc(c.source)}</td>
    <td>${esc(c.created_at.slice(0,10))}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="openCustModal(${Number(c.id)})">詳細</button></td>
  </tr>`).join('')}</tbody></table>`;
  const nav = document.getElementById('cust-page-nav');
  nav.innerHTML = custTotalPages > 1 ? `
    <button class="btn btn-ghost btn-sm" ${custPage<=1?'disabled':''} onclick="loadCustomers(${custPage-1})">←</button>
    <span style="color:#64748b">${custPage} / ${custTotalPages}</span>
    <button class="btn btn-ghost btn-sm" ${custPage>=custTotalPages?'disabled':''} onclick="loadCustomers(${custPage+1})">→</button>` : '';
}

function searchCustomers() { loadCustomers(1); }

async function openCustModal(id) {
  currentCustId = id;
  const res = await api('GET', '/admin/customers/' + id);
  if (!res || !res.ok) return;
  const c = await res.json();
  document.getElementById('cust-modal-title').textContent = c.name + ' 様';
  // inputのvalue・textareaはHTML属性経由でなくJSプロパティで設定しXSSを回避する
  document.getElementById('cust-modal-body').innerHTML = `
    <div class="field"><label>氏名</label><input id="cm-name"></div>
    <div class="field"><label>フリガナ</label><input id="cm-kana"></div>
    <div class="field"><label>電話番号</label><input id="cm-phone"></div>
    <div class="field"><label>メール</label><input id="cm-email"></div>
    <div class="field"><label>生年月日</label><input id="cm-birth" type="date"></div>
    <div class="field"><label>性別</label><select id="cm-gender"><option value="">未選択</option><option>男性</option><option>女性</option><option>その他</option></select></div>
    <div class="field"><label>住所</label><input id="cm-address"></div>
    <div class="field"><label>備考</label><textarea id="cm-notes" rows="2"></textarea></div>
    ${c.reservations&&c.reservations.length?`<h4 style="font-size:0.82rem;font-weight:600;margin:1rem 0 0.5rem">予約履歴</h4>
    <table style="width:100%;font-size:0.78rem"><thead><tr><th>日時</th><th>メニュー</th><th>ステータス</th></tr></thead>
    <tbody>${c.reservations.map(r=>`<tr><td>${esc(r.date)} ${esc(r.time)}</td><td>${esc(r.menu_name)||'—'}</td><td>${statusBadge(r.status)}</td></tr>`).join('')}</tbody></table>`:''}`;
  // valueはプロパティ経由でセット（HTML属性に展開しないためエスケープ不要・かつ安全）
  document.getElementById('cm-name').value    = c.name     || '';
  document.getElementById('cm-kana').value    = c.name_kana|| '';
  document.getElementById('cm-phone').value   = c.phone    || '';
  document.getElementById('cm-email').value   = c.email    || '';
  document.getElementById('cm-birth').value   = c.birthdate|| '';
  document.getElementById('cm-address').value = c.address  || '';
  document.getElementById('cm-notes').value   = c.notes    || '';
  const genderEl = document.getElementById('cm-gender');
  for (const opt of genderEl.options) { opt.selected = opt.value === (c.gender||''); }
  document.getElementById('cust-del-btn').style.display = id ? '' : 'none';
  openModal('cust-modal');
}

async function saveCust() {
  const data = {
    name: document.getElementById('cm-name').value,
    name_kana: document.getElementById('cm-kana').value,
    phone: document.getElementById('cm-phone').value,
    email: document.getElementById('cm-email').value,
    birthdate: document.getElementById('cm-birth').value,
    gender: document.getElementById('cm-gender').value,
    address: document.getElementById('cm-address').value,
    notes: document.getElementById('cm-notes').value,
  };
  const res = currentCustId
    ? await api('PUT', '/admin/customers/' + currentCustId, data)
    : await api('POST', '/admin/customers', data);
  if (res && res.ok) { closeModal('cust-modal'); loadCustomers(custPage); }
}

async function deleteCust() {
  if (!confirm(currentCustId + ' の顧客を削除しますか？')) return;
  const res = await api('DELETE', '/admin/customers/' + currentCustId);
  if (res && res.ok) { closeModal('cust-modal'); loadCustomers(custPage); }
}

function openNewCustModal() {
  currentCustId = null;
  document.getElementById('cust-modal-title').textContent = '顧客追加';
  document.getElementById('cust-modal-body').innerHTML = `
    <div class="field"><label>氏名 *</label><input id="cm-name"></div>
    <div class="field"><label>フリガナ</label><input id="cm-kana"></div>
    <div class="field"><label>電話番号</label><input id="cm-phone" type="tel"></div>
    <div class="field"><label>メール</label><input id="cm-email" type="email"></div>
    <div class="field"><label>生年月日</label><input id="cm-birth" type="date"></div>
    <div class="field"><label>性別</label><select id="cm-gender"><option value="">未選択</option><option>男性</option><option>女性</option><option>その他</option></select></div>
    <div class="field"><label>住所</label><input id="cm-address"></div>
    <div class="field"><label>備考</label><textarea id="cm-notes" rows="2"></textarea></div>`;
  document.getElementById('cust-del-btn').style.display = 'none';
  openModal('cust-modal');
}

async function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  const msg = document.getElementById('import-msg');
  msg.innerHTML = '<div class="msg">インポート中...</div>';
  try {
    const res = await fetch(API + '/admin/import-export/customers/import', {
      method: 'POST', headers: {'X-Token': token}, body: formData
    });
    const d = await res.json();
    msg.innerHTML = `<div class="msg msg-ok">インポート完了：${d.imported}件追加、${d.skipped}件スキップ、${d.errors}件エラー</div>`;
    loadCustomers(1);
  } catch(e) {
    msg.innerHTML = '<div class="msg msg-err">インポートに失敗しました</div>';
  }
  input.value = '';
}

async function exportCSV() {
  const res = await fetch(API + '/admin/import-export/customers/export', {headers: {'X-Token': token}});
  if (!res.ok) return;
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'customers.csv'; a.click();
  URL.revokeObjectURL(url);
}

// 手動予約
async function openNewResModal() {
  const res = await api('GET', '/admin/menus');
  const menus = res && res.ok ? await res.json() : [];
  const sel = document.getElementById('nr-menu');
  sel.innerHTML = '<option value="">選択してください</option>' + menus.map(m => `<option value="${m.id}" data-name="${m.name}" data-dur="${m.duration_min}">${m.name}（${m.duration_min}分）</option>`).join('');
  document.getElementById('nr-date').value = document.getElementById('res-date').value || today();
  openModal('new-res-modal');
}

async function submitNewRes() {
  const menuSel = document.getElementById('nr-menu');
  const opt = menuSel.selectedOptions[0];
  const res = await api('POST', '/admin/reservations', {
    name: document.getElementById('nr-name').value,
    phone: document.getElementById('nr-phone').value,
    email: document.getElementById('nr-email').value,
    date: document.getElementById('nr-date').value,
    time: document.getElementById('nr-time').value.slice(0,5),
    menu_id: menuSel.value,
    menu_name: opt ? opt.dataset.name : '',
    duration_min: opt ? parseInt(opt.dataset.dur) : 30,
    notes: document.getElementById('nr-notes').value,
  });
  if (res && res.ok) { closeModal('new-res-modal'); loadReservations(); }
}

// リマインド
async function runReminder() {
  const msg = document.getElementById('reminder-msg');
  msg.innerHTML = '<div class="msg">送信中...</div>';
  const res = await api('POST', '/admin/reminder/run');
  if (res && res.ok) {
    const d = await res.json();
    msg.innerHTML = `<div class="msg msg-ok">${d.date} の対象：${d.total}件、送信：${d.sent}件、失敗：${d.failed}件</div>`;
  } else {
    msg.innerHTML = '<div class="msg msg-err">実行に失敗しました</div>';
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); }));

checkAuth();
</script>
