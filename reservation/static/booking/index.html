<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#f8f9fc;color:#0c1a35;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:2rem 1.25rem 4rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:0.25rem}
.sub{font-size:0.85rem;color:#64748b;margin-bottom:2rem}
.step{display:none}
.step.active{display:block}
.step-label{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;color:#c9a84c;text-transform:uppercase;margin-bottom:1rem}
.card{background:#fff;border:1px solid #e2e8f0;padding:1.5rem;margin-bottom:1rem;border-radius:2px}
.grid-dates{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:1rem}
.grid-times{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem}
.btn-slot{border:1px solid #e2e8f0;background:#fff;padding:0.6rem 0;font-size:0.82rem;cursor:pointer;border-radius:2px;transition:all 0.15s}
.btn-slot:hover:not(:disabled){border-color:#0c1a35;background:#f0f2f5}
.btn-slot.selected{background:#0c1a35;color:#fff;border-color:#0c1a35}
.btn-slot:disabled{opacity:0.35;cursor:not-allowed;text-decoration:line-through}
label{display:block;font-size:0.72rem;font-weight:500;color:#64748b;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:0.4rem}
input,select,textarea{width:100%;border:1px solid #e2e8f0;padding:0.75rem 0.875rem;font-size:0.875rem;color:#0c1a35;outline:none;font-family:inherit;border-radius:2px}
input:focus,select:focus,textarea:focus{border-color:#0c1a35}
.field{margin-bottom:1.25rem}
.btn{display:block;width:100%;padding:1rem;background:#0c1a35;color:#fff;border:none;font-size:0.9rem;font-weight:500;cursor:pointer;letter-spacing:0.03em;border-radius:2px;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-outline{background:#fff;color:#0c1a35;border:1px solid #0c1a35;margin-top:0.75rem}
.confirm-row{display:flex;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid #f0f2f5;font-size:0.875rem}
.confirm-row:last-child{border-bottom:none}
.confirm-label{color:#64748b;min-width:100px}
.success{text-align:center;padding:3rem 1rem}
.success svg{margin:0 auto 1.5rem;display:block}
.success h2{font-size:1.3rem;margin-bottom:0.75rem}
.success p{font-size:0.875rem;color:#64748b;line-height:1.7}
.err{color:#dc2626;font-size:0.8rem;margin-top:0.5rem;display:none}
.loading{text-align:center;color:#64748b;padding:2rem;font-size:0.875rem}
.menu-item{border:1px solid #e2e8f0;padding:1rem;cursor:pointer;border-radius:2px;margin-bottom:0.5rem;transition:all 0.15s}
.menu-item:hover{border-color:#0c1a35}
.menu-item.selected{border-color:#0c1a35;background:#f8f9fc}
.menu-name{font-weight:500;font-size:0.9rem}
.menu-sub{font-size:0.78rem;color:#64748b;margin-top:0.2rem}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="app-title">ご予約</h1>
  <p class="sub">以下の手順でご予約ください</p>

  <!-- STEP1: メニュー -->
  <div class="step active" id="step1">
    <div class="step-label">Step 1 — メニューを選ぶ</div>
    <div id="menu-list"><div class="loading">読み込み中...</div></div>
    <div id="err-menu" class="err">メニューを選択してください</div>
  </div>

  <!-- STEP2: 日付 -->
  <div class="step" id="step2">
    <div class="step-label">Step 2 — 日程を選ぶ</div>
    <div class="card">
      <div id="date-list"><div class="loading">読み込み中...</div></div>
    </div>
    <div id="err-date" class="err">日程を選択してください</div>
    <button class="btn btn-outline" onclick="goStep(1)">← 戻る</button>
  </div>

  <!-- STEP3: 時間 -->
  <div class="step" id="step3">
    <div class="step-label">Step 3 — 時間を選ぶ</div>
    <div class="card">
      <div id="time-list"><div class="loading">読み込み中...</div></div>
    </div>
    <div id="err-time" class="err">時間を選択してください</div>
    <button class="btn btn-outline" onclick="goStep(2)">← 戻る</button>
  </div>

  <!-- STEP4: お客様情報 -->
  <div class="step" id="step4">
    <div class="step-label">Step 4 — お客様情報</div>
    <div class="card">
      <div class="field">
        <label>お名前 <span style="color:#dc2626">*</span></label>
        <input id="f-name" type="text" placeholder="山田 太郎" required>
      </div>
      <div class="field">
        <label>電話番号 <span style="color:#dc2626">*</span></label>
        <input id="f-phone" type="tel" placeholder="090-0000-0000" required>
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input id="f-email" type="email" placeholder="example@example.com">
      </div>
      <div class="field">
        <label>備考・ご要望</label>
        <textarea id="f-notes" rows="3" placeholder="アレルギー・ご要望等"></textarea>
      </div>
    </div>
    <div id="err-form" class="err">入力内容を確認してください</div>
    <button class="btn" onclick="goConfirm()">確認画面へ →</button>
    <button class="btn btn-outline" onclick="goStep(3)">← 戻る</button>
  </div>

  <!-- STEP5: 確認 -->
  <div class="step" id="step5">
    <div class="step-label">Step 5 — 内容を確認</div>
    <div class="card">
      <div class="confirm-row"><span class="confirm-label">メニュー</span><span id="c-menu"></span></div>
      <div class="confirm-row"><span class="confirm-label">日時</span><span id="c-datetime"></span></div>
      <div class="confirm-row"><span class="confirm-label">お名前</span><span id="c-name"></span></div>
      <div class="confirm-row"><span class="confirm-label">電話番号</span><span id="c-phone"></span></div>
      <div class="confirm-row"><span class="confirm-label">メール</span><span id="c-email"></span></div>
      <div class="confirm-row" id="c-notes-row" style="display:none">
        <span class="confirm-label">備考</span><span id="c-notes"></span>
      </div>
    </div>
    <div id="err-submit" class="err">予約に失敗しました。時間をおいて再度お試しください。</div>
    <button class="btn" id="btn-submit" onclick="submitBooking()">この内容で予約する</button>
    <button class="btn btn-outline" onclick="goStep(4)">← 戻る</button>
  </div>

  <!-- 完了 -->
  <div class="step" id="step-done">
    <div class="success">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
      </svg>
      <h2>ご予約が完了しました</h2>
      <p>ご登録のメールアドレスに確認メールをお送りしました。<br>前日にリマインドメールをお送りします。</p>
    </div>
  </div>
</div>

<script>
const API = '';
let sel = { menu: null, date: null, time: null };

async function init() {
  document.title = document.getElementById('app-title').textContent;
  await loadMenus();
}

async function loadMenus() {
  try {
    const res = await fetch(API + '/api/booking/menus');
    const menus = await res.json();
    const el = document.getElementById('menu-list');
    if (!menus.length) { el.innerHTML = '<p style="color:#64748b;font-size:0.875rem">メニューがありません</p>'; return; }
    el.innerHTML = menus.map(m => `
      <div class="menu-item" onclick="selectMenu(${m.id},'${m.name}',${m.duration_min})" data-id="${m.id}">
        <div class="menu-name">${m.name}</div>
        <div class="menu-sub">${m.duration_min}分${m.price ? ' / ' + m.price.toLocaleString() + '円' : ''}</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('menu-list').innerHTML = '<p style="color:#dc2626;font-size:0.875rem">読み込みに失敗しました</p>';
  }
}

function selectMenu(id, name, dur) {
  sel.menu = { id, name, dur };
  document.querySelectorAll('.menu-item').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.id) === id);
  });
  setTimeout(() => goStep(2), 200);
}

async function goStep(n) {
  if (n === 2 && !sel.menu) { show('err-menu'); return; }
  if (n === 3 && !sel.date) { show('err-date'); return; }
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  window.scrollTo(0, 0);
  if (n === 2) await loadDates();
  if (n === 3) await loadTimes();
}

async function loadDates() {
  const el = document.getElementById('date-list');
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(API + '/api/booking/available-dates');
    const data = await res.json();
    const weekdays = ['日','月','火','水','木','金','土'];
    el.innerHTML = '<div class="grid-dates">' + data.dates.slice(0, 28).map(d => {
      const dt = new Date(d); const wd = weekdays[dt.getDay()];
      const color = dt.getDay()===0?'color:#dc2626':dt.getDay()===6?'color:#2563eb':'';
      return `<button class="btn-slot" onclick="selectDate('${d}')" data-date="${d}">
        <span style="font-size:0.7rem;display:block">${d.slice(5).replace('-','/')}</span>
        <span style="font-size:0.7rem;${color}">${wd}</span>
      </button>`;
    }).join('') + '</div>';
  } catch(e) { el.innerHTML = '<p style="color:#dc2626">読み込みに失敗しました</p>'; }
}

function selectDate(d) {
  sel.date = d;
  document.querySelectorAll('#date-list .btn-slot').forEach(b => {
    b.classList.toggle('selected', b.dataset.date === d);
  });
  setTimeout(() => goStep(3), 200);
}

async function loadTimes() {
  const el = document.getElementById('time-list');
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(API + '/api/booking/available-times/' + sel.date);
    const data = await res.json();
    el.innerHTML = '<div class="grid-times">' + data.slots.map(s =>
      `<button class="btn-slot" ${!s.available?'disabled':''} onclick="selectTime('${s.time}')" data-time="${s.time}">${s.time}</button>`
    ).join('') + '</div>';
  } catch(e) { el.innerHTML = '<p style="color:#dc2626">読み込みに失敗しました</p>'; }
}

function selectTime(t) {
  sel.time = t;
  document.querySelectorAll('#time-list .btn-slot').forEach(b => {
    b.classList.toggle('selected', b.dataset.time === t);
  });
  setTimeout(() => goStep(4), 200);
}

function goConfirm() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !phone) { show('err-form'); return; }
  hide('err-form');
  document.getElementById('c-menu').textContent = sel.menu.name;
  document.getElementById('c-datetime').textContent = sel.date + ' ' + sel.time;
  document.getElementById('c-name').textContent = name;
  document.getElementById('c-phone').textContent = phone;
  document.getElementById('c-email').textContent = document.getElementById('f-email').value || '—';
  const notes = document.getElementById('f-notes').value.trim();
  if (notes) { document.getElementById('c-notes').textContent = notes; document.getElementById('c-notes-row').style.display = 'flex'; }
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step5').classList.add('active');
  window.scrollTo(0,0);
}

async function submitBooking() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '送信中...';
  hide('err-submit');
  try {
    const res = await fetch(API + '/api/booking/create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('f-name').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        date: sel.date, time: sel.time,
        menu_id: String(sel.menu.id), menu_name: sel.menu.name,
        duration_min: sel.menu.dur,
        notes: document.getElementById('f-notes').value.trim(),
      })
    });
    if (res.ok) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-done').classList.add('active');
      window.scrollTo(0,0);
    } else {
      const err = await res.json();
      document.getElementById('err-submit').textContent = err.detail || '予約に失敗しました';
      show('err-submit');
      btn.disabled = false; btn.textContent = 'この内容で予約する';
    }
  } catch(e) {
    show('err-submit');
    btn.disabled = false; btn.textContent = 'この内容で予約する';
  }
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

init();
</script>
</body>
</html>
